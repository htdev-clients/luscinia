<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/favicon.svg">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "earth-dark": "#2C3E30",
            "earth-light": "#E8E6E1",
            sage: "#8DA399",
            clay: "#C17C74",
            sand: "#F5F2EA",
            loam: "#4A4A4A",
          },
          fontFamily: {
            sans: ["Lato", "sans-serif"],
            serif: ["Playfair Display", "serif"],
          },
        },
      },
    };
  </script>

  <!-- Custom Styles -->
  <style>
    .nav-link {
      position: relative;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #c17c74;
      transition: width 0.3s ease;
    }

    .nav-link:hover::after,
    .nav-link.active-nav::after {
      width: 100%;
    }

    .hero-bg {
      /* Note: In Jekyll, use relative paths or site.baseurl for images */
      background-image: linear-gradient(rgba(44, 62, 48, 0.5),
        rgba(44, 62, 48, 0.5)),
      url("{{ site.baseurl }}/images/hero.jpg");
      background-size: cover;
      background-position: center;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-entry {
      animation: fadeInUp 0.6s ease-out forwards;
    }
  </style>
</head>

<body class="bg-sand text-loam antialiased selection:bg-sage selection:text-white flex flex-col min-h-screen">
  <!-- Include Navbar -->
  {% include navbar.html %}

  <!-- Main Content Injection -->
  <main class="flex-grow pt-20 animate-entry">{{ content }}</main>

  <!-- Include Footer -->
  {% include footer.html %}

  <!-- Scripts -->
  <script>
    lucide.createIcons();

    // Mobile Menu Toggle
    function toggleMobileMenu() {
      const menu = document.getElementById("mobile-menu");
      menu.classList.toggle("hidden");
    }

    // Active Link Highlighter
    document.addEventListener("DOMContentLoaded", function () {
      const currentPath = window.location.pathname;
      const navLinks = document.querySelectorAll(".nav-link, #mobile-menu a");

      navLinks.forEach((link) => {
        // Check if the link href matches the end of the current URL
        if (
          link.getAttribute("href") !== "/" &&
          currentPath.includes(link.getAttribute("href"))
        ) {
          link.classList.add("active-nav");
        } else if (
          link.getAttribute("href") === "/" &&
          (currentPath === "/" || currentPath.endsWith("index.html"))
        ) {
          link.classList.add("active-nav");
        }
      });
    });
  </script>
</body>

</html>
